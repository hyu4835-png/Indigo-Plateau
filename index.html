            <div className="space-y-4 flex-1">
              {notices.slice(0, 5).map(n => (
                <div key={n.id} onClick={() => { setSelectedNotice(n); setCurrentPage('noticeDetail'); }} className="flex flex-col cursor-pointer group border-b border-gray-50 pb-3 last:border-0 font-bold">
                  <div className="flex items-center gap-2">
                    <div className="w-1 h-1 bg-emerald-500 rounded-full"></div>
                    <p className="text-[11px] font-bold text-gray-700 truncate group-hover:text-emerald-600">{n.title}</p>
                  </div>
                  <span className="text-[9px] text-gray-300 font-bold mt-1 uppercase">{n.category} • {n.date}</span>
                </div>
              ))}
            </div>
          </section>
        </div>
      </div>
    );

    const MessengerView = ({ user, publicUsers, myChats, allMessages, activeChatId, setActiveChatId, chatInputEmail, setChatInputEmail, handleCreateChat, chatMessageInput, setChatMessageInput, handleSendMessage }) => {
      const activeChat = myChats.find(c => c.id === activeChatId);
      const partnerId = activeChat?.participants.find(id => id !== user.uid);
      const partner = publicUsers.find(u => u.uid === partnerId);
      
      const chatMessages = allMessages.filter(m => m.roomId === activeChatId).sort((a,b) => a.timestamp - b.timestamp);
      
      // 자동 스크롤 버그 수정: 특정 컨테이너 내부만 스크롤 되도록 변경 (scrollIntoView 대체)
      const chatContainerRef = useRef(null);

      useEffect(() => {
         if (chatContainerRef.current) {
            chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
         }
      }, [chatMessages]);

      return (
        <div className="animate-in fade-in duration-500 h-[calc(100vh-140px)] min-h-[500px] bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden flex font-sans text-left">
           {/* Chat List */}
           <div className="w-1/3 border-r border-gray-100 flex flex-col bg-gray-50/50 min-w-[200px]">
              <div className="p-4 border-b border-gray-100 bg-white">
                 <h3 className="font-black text-sm text-gray-800 uppercase tracking-widest mb-3">사내 메신저</h3>
                 <div className="flex gap-2">
                    <input type="email" placeholder="상대방 이메일 입력" className="flex-1 px-3 py-2 text-[10px] font-bold bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-emerald-500 transition-colors" value={chatInputEmail} onChange={e => setChatInputEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleCreateChat()} />
                    <button onClick={handleCreateChat} className="bg-emerald-600 text-white px-3 py-2 rounded-lg hover:bg-emerald-700 transition-colors"><UserPlus size={14}/></button>
                 </div>
              </div>
              <div className="flex-1 overflow-y-auto scrollbar-hide p-2 space-y-1">
                 {myChats.map(chat => {
                    const pId = chat.participants.find(id => id !== user.uid);
                    const pUser = publicUsers.find(u => u.uid === pId);
                    const isActive = chat.id === activeChatId;
                    return (
                       <div key={chat.id} onClick={() => setActiveChatId(chat.id)} className={`p-3 rounded-lg cursor-pointer flex items-center gap-3 transition-colors ${isActive ? 'bg-emerald-50 border border-emerald-100' : 'hover:bg-white border border-transparent'}`}>
                          <div className="w-10 h-10 bg-gray-200 rounded-full flex-shrink-0 overflow-hidden shadow-sm border border-white">
                             {pUser?.profileImage ? <img src={pUser.profileImage} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center text-gray-500 font-bold text-xs">{pUser?.name?.charAt(0) || '?'}</div>}
                          </div>
                          <div className="flex-1 overflow-hidden">
                             <div className="flex justify-between items-center mb-1">
                                <span className="text-[11px] font-black text-gray-900 truncate pr-2">{pUser?.name || '알 수 없음'}</span>
                                <span className={`text-[8px] font-bold ${isActive ? 'text-emerald-500' : 'text-gray-400'}`}>{new Date(chat.lastMessageTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                             </div>
                             <p className={`text-[10px] font-medium truncate ${isActive ? 'text-emerald-700' : 'text-gray-500'}`}>{chat.lastMessage || '새로운 대화방입니다.'}</p>
                          </div>
                       </div>
                    );
                 })}
                 {myChats.length === 0 && <div className="text-center mt-10 text-[10px] font-bold text-gray-400">진행 중인 대화가 없습니다.</div>}
              </div>
           </div>

           {/* Chat Room */}
           <div className="flex-1 flex flex-col bg-white relative">
              {activeChatId && partner ? (
                 <>
                    {/* Header */}
                    <div className="h-16 px-6 border-b border-gray-100 flex items-center gap-4 bg-white/80 backdrop-blur-sm z-10 shadow-sm">
                       <div className="w-10 h-10 bg-gray-200 rounded-full overflow-hidden shadow-sm border border-white">
                          {partner.profileImage ? <img src={partner.profileImage} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center text-gray-500 font-bold text-xs">{partner.name.charAt(0)}</div>}
                       </div>
                       <div className="flex flex-col">
                          <span className="font-black text-[13px] text-gray-900">{partner.name} <span className="text-[11px] text-gray-500">{partner.position}</span></span>
                          <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">{partner.dept}</span>
                       </div>
                    </div>
                    {/* Messages */}
                    <div ref={chatContainerRef} className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50">
                       {chatMessages.map((msg, i) => {
                          const isMine = msg.senderId === user.uid;
                          const showProfile = !isMine && (i === 0 || chatMessages[i-1].senderId !== msg.senderId);
                          return (
                             <div key={msg.id} className={`flex ${isMine ? 'justify-end' : 'justify-start'} items-end gap-2`}>
                                {!isMine && (
                                   <div className="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mb-1 border border-white shadow-sm">
                                      {showProfile ? (partner.profileImage ? <img src={partner.profileImage} className="w-full h-full object-cover"/> : <div className="w-full h-full bg-gray-200 flex items-center justify-center text-gray-500 font-bold text-[10px]">{partner.name.charAt(0)}</div>) : <div className="w-8 h-8 bg-transparent border-none shadow-none" />}
                                   </div>
                                )}
                                <div className={`flex flex-col ${isMine ? 'items-end' : 'items-start'} max-w-[70%]`}>
                                   <div className="flex items-end gap-2">
                                      {isMine && <span className="text-[8px] font-bold text-gray-400 mb-1 flex-shrink-0">{new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>}
                                      <div className={`px-4 py-2.5 rounded-2xl text-[12px] font-medium shadow-sm whitespace-pre-wrap ${isMine ? 'bg-emerald-500 text-white rounded-br-none' : 'bg-white border border-gray-100 text-gray-800 rounded-bl-none'}`}>
                                         {msg.text}
                                      </div>
                                      {!isMine && <span className="text-[8px] font-bold text-gray-400 mb-1 flex-shrink-0">{new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>}
                                   </div>
                                </div>
                             </div>
                          );
                       })}
                    </div>
                    {/* Input */}
                    <form onSubmit={handleSendMessage} className="p-4 bg-white border-t border-gray-100">
                       <div className="flex items-center gap-2 bg-gray-50 p-1.5 rounded-xl border border-gray-200 focus-within:border-emerald-500 focus-within:bg-white transition-colors">
                          <input type="text" placeholder="메시지를 입력하세요..." className="flex-1 bg-transparent px-3 py-2 text-[12px] font-bold outline-none" value={chatMessageInput} onChange={e => setChatMessageInput(e.target.value)} />
                          <button type="submit" disabled={!chatMessageInput.trim()} className="w-10 h-10 bg-emerald-600 text-white rounded-lg flex items-center justify-center hover:bg-emerald-700 disabled:opacity-50 disabled:hover:bg-emerald-600 transition-colors shadow-sm"><Send size={16}/></button>
                       </div>
                    </form>
                 </>
              ) : (
                 <div className="flex-1 flex flex-col items-center justify-center text-gray-400 bg-slate-50/50">
                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-100 mb-4"><MessageSquare size={24} className="text-emerald-500"/></div>
                    <p className="text-[12px] font-black uppercase tracking-widest">대화방을 선택하거나 새로운 대화를 시작하세요.</p>
                 </div>
              )}
           </div>
        </div>
      );
    };

    const ConductView = ({ setCurrentPage }) => {
      const scrollRef = useRef(null);

      useEffect(() => {
        window.scrollTo(0, 0);
        if (scrollRef.current) scrollRef.current.scrollTop = 0;
      }, []);

      return (
        <div className="animate-in fade-in duration-500 space-y-6 text-left font-sans">
          <div className="flex justify-between items-center mb-4">
            <div>
               <h3 className="text-xl font-black text-emerald-950 uppercase tracking-tight">스태프 행동 지침</h3>
               <p className="text-[10px] text-gray-400 font-bold uppercase mt-0.5 tracking-widest">Code of Conduct</p>
            </div>
            <button onClick={() => setCurrentPage('home')} className="text-xs font-bold text-gray-400 hover:text-emerald-600 flex items-center gap-1"><ChevronLeft size={14}/> 홈으로</button>
          </div>
          <div ref={scrollRef} className="bg-white border border-gray-200 shadow-sm rounded-xl p-8 md:p-12 text-sm text-gray-700 leading-relaxed font-medium space-y-10 max-h-[70vh] overflow-y-auto">
             
             <div className="text-center pb-8 border-b border-gray-100">
               <h2 className="text-2xl font-black text-gray-900 mb-2">석영고원 리그 본부 스태프 행동 지침</h2>
               <p className="text-[11px] text-gray-400 uppercase tracking-widest">최종 개정일 : 2024년 6월 1일</p>
             </div>

             <section>
                <ul className="space-y-4">
                   <li>
                      <p className="font-bold text-gray-900">1.1. 유사 시 상황에 대비해 파트너 포켓몬(1마리 이상)을 항상 대동할 것.</p>
                      <ul className="pl-5 mt-2 space-y-2 text-[12.5px] text-gray-600 list-disc list-outside marker:text-emerald-400">
                         <li><span className="font-bold text-gray-700">1.1.1.</span> 파트너 포켓몬을 대동하지 않은 상태에서 입은 피해는 리그 측에서 보상하지 않으나, 예외의 사항에 한해 보상 가능.</li>
                         <li><span className="font-bold text-gray-700">1.1.2.</span> 여기서 예외의 사항이란 파트너 포켓몬이 1마리인 상황에서 배틀 불능 상태인 경우 혹은 비전투 파트너일 경우, 트레이너 본인이 배틀 불능에 준하는 상태(신체・정신적인 손상 등)일 경우에 한한다.</li>
                      </ul>
                   </li>
                </ul>
             </section>

             <section>
                <ul className="space-y-4">
                   <li>
                      <p className="font-bold text-gray-900">1.2. 상위 트레이너는 하위 트레이너의 배틀 신청을 거절하지 않을 것.</p>
                      <ul className="pl-5 mt-2 space-y-2 text-[12.5px] text-gray-600 list-disc list-outside marker:text-emerald-400">
                         <li><span className="font-bold text-gray-700">1.2.1.</span> 상위 트레이너의 기준은 챔피언, 사천왕, 엘리트 트레이너, 일반 트레이너 순서를 기준으로 하며, 해당 범위 내에 자신의 직책이 존재하지 않을 경우 일반 트레이너로 대우함.</li>
                      </ul>
                   </li>
                </ul>
             </section>

             <section>
                <ul className="space-y-4">
                   <li>
                      <p className="font-bold text-gray-900">1.3. 사무실 및 업무 공간에서의 유해 행위를 자제할 것.</p>
                      <ul className="pl-5 mt-2 space-y-2 text-[12.5px] text-gray-600 list-disc list-outside marker:text-emerald-400">
                         <li><span className="font-bold text-gray-700">1.3.1.</span> 여기서 유해 행위의 기준은 관동・성도법에 의거함.</li>
                         <li><span className="font-bold text-gray-700">1.3.2.</span> 유해 행위로 지속적인 민원과 신고가 접수될 경우, 해당 대상을 감봉 및 정직 처리함.</li>
                         <li><span className="font-bold text-gray-700">1.3.3.</span> 단, 챔피언 혹은 사천왕과 같이 리그 운영에 있어서 대체할 수 없는 직위의 인물일 경우 예외를 둔다.</li>
                      </ul>
                   </li>
                </ul>
             </section>

             <section>
                <ul className="space-y-4">
                   <li>
                      <p className="font-bold text-gray-900">1.4. 비상연락망을 2인 이상 등록할 것.</p>
                      <ul className="pl-5 mt-2 space-y-2 text-[12.5px] text-gray-600 list-disc list-outside marker:text-emerald-400">
                         <li><span className="font-bold text-gray-700">1.4.1.</span> 비상연락망에 등록된 인물이 1인일 경우, 유사 시 연락이 불가능한 상황이 발생할 수 있음을 주의.</li>
                         <li><span className="font-bold text-gray-700">1.4.2.</span> 비상연락망은 가족으로 제한하지 아니한다.</li>
                      </ul>
                   </li>
                </ul>
             </section>

             <section>
                <ul className="space-y-4">
                   <li>
                      <p className="font-bold text-gray-900">1.5. 리그 운영 규칙에 해당되는 사유로 리그에서 은퇴를 선언할 경우, 석영리그 인트라넷의 사번은 반납한다.</p>
                      <ul className="pl-5 mt-2 space-y-2 text-[12.5px] text-gray-600 list-disc list-outside marker:text-emerald-400">
                         <li><span className="font-bold text-gray-700">1.5.1.</span> 단, 석영리그에서 공인한 체육관직으로 리그와의 연계를 이어갈 경우 사번을 유지할 수 있다.</li>
                         <li><span className="font-bold text-gray-700">1.5.2.</span> 위의 규칙은 관장 및 체육관 트레이너, 일반 스태프까지 적용된다.</li>
                         <li><span className="font-bold text-gray-700">1.5.3.</span> 물 아저씨는 적용되지 않는다.</li>
                      </ul>
                   </li>
                </ul>
             </section>
          </div>
        </div>
      );
    };

    const LiveStadiumView = ({ setCurrentPage }) => {
      const videos = [
        { id: 1, url: "https://i.ibb.co/237hrV73/1774956407068.jpg", title: "도전자vs소우 FULL LIVE", time: "LIVE", views: "1.2만명 시청 중" },
        { id: 2, url: "https://i.ibb.co/NgYrq693/1774956407275.jpg", title: "vs마론 하이라이트", time: "종료" }
      ];

      return (
        <div className="animate-in fade-in duration-500 space-y-6 text-left font-sans">
          <div className="flex justify-between items-center mb-4">
            <div>
               <h3 className="text-xl font-black text-emerald-950 uppercase tracking-tight">라이브 스타디움</h3>
               <p className="text-[10px] text-gray-400 font-bold uppercase mt-0.5 tracking-widest">Live Stadium Gallery</p>
            </div>
            <button onClick={() => setCurrentPage('home')} className="text-xs font-bold text-gray-400 hover:text-emerald-600 flex items-center gap-1"><ChevronLeft size={14}/> 홈으로</button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {videos.map(v => (
              <div key={v.id} className="flex flex-col group cursor-pointer">
                <div className="relative w-full aspect-[16/9] rounded-xl overflow-hidden bg-gray-100 mb-3 shadow-sm border border-gray-200">
                  <img src={v.url} alt={v.title} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                  <div className="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors duration-300"></div>
                  <div className="absolute inset-0 flex items-center justify-center">
                    <div className="w-14 h-14 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center text-red-600 shadow-lg transform group-hover:scale-110 transition-transform duration-300">
                       <PlayCircle size={32} className="text-red-600" />
                    </div>
                  </div>
                  <div className="absolute top-3 left-3 bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-widest flex items-center gap-1.5 shadow-sm">
                    <span className="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span> {v.time}
                  </div>
                </div>
                <h4 className="font-black text-[14px] text-gray-900 group-hover:text-emerald-600 transition-colors line-clamp-2">{v.title}</h4>
                <p className="text-[11px] text-gray-500 font-bold mt-1">{v.views}</p>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const TasksView = ({ tasks, taskFilter, setTaskFilter, openTaskModal }) => {
      const filteredTasks = tasks.filter(t => taskFilter === '전체' || (t.types && t.types.includes(taskFilter)));
      return (
        <div className="animate-in fade-in duration-500 space-y-6 text-left font-sans font-bold">
          <div className="flex justify-between items-end mb-6">
            <div><h3 className="text-xl font-black text-emerald-950 uppercase tracking-tight">업무 관리 센터</h3><p className="text-[10px] text-gray-400 font-bold uppercase mt-0.5 tracking-widest">Task Management Dashboard</p></div>
            <button onClick={() => openTaskModal('add')} className="px-6 py-3 bg-emerald-600 text-white rounded-xl text-[11px] font-black uppercase tracking-widest shadow-lg flex items-center gap-2 hover:bg-emerald-700 transition-all active:scale-95"><Plus size={16}/> New Task</button>
          </div>
          <div className="flex gap-2 mb-6">
            {['전체', '내 업무', '부서 업무'].map(f => (
              <button key={f} onClick={() => setTaskFilter(f)} className={`px-5 py-2 text-[10px] font-black uppercase rounded-full transition-all ${taskFilter === f ? 'bg-gray-800 text-white shadow-md' : 'bg-white text-gray-400 border border-gray-100 hover:bg-gray-50'}`}>{f}</button>
            ))}
          </div>
          <div className="bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden font-bold">
            <table className="w-full text-left border-collapse">
              <thead className="bg-gray-50 border-b border-gray-100"><tr className="text-[9px] font-black text-gray-400 uppercase tracking-widest"><th className="px-6 py-4">Status</th><th className="px-6 py-4">Task Name</th><th className="px-6 py-4">Priority</th><th className="px-6 py-4 text-right">Actions</th></tr></thead>
              <tbody className="divide-y divide-gray-50 font-bold">
                {filteredTasks.map(task => (
                  <tr key={task.id} className="hover:bg-gray-50/50 transition-colors">
                    <td className="px-6 py-4"><span className={`text-[9px] font-black px-2 py-0.5 rounded-full border ${task.status === '완료' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-indigo-100 text-indigo-700 border-indigo-200'} uppercase`}>{task.status}</span></td>
                    <td className="px-6 py-4 font-black text-[12px] text-gray-800 truncate max-w-xs">{task.department && <span className="text-emerald-600 mr-1">[{task.department}]</span>}{task.title}</td>
                    <td className="px-6 py-4"><span className={`text-[10px] font-black ${task.priority === '긴급' ? 'text-red-500' : 'text-gray-400'}`}>{task.priority || '보통'}</span></td>
                    <td className="px-6 py-4 text-right"><button onClick={() => openTaskModal('edit', task)} className="p-2 text-gray-300 hover:text-emerald-500 transition-colors"><MoreVertical size={16}/></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    const ProfileView = ({ userProfile, setIsProfileModalOpen, userApplications, leagueEntry }) => (
      <div className="animate-in fade-in duration-500 space-y-6 text-left font-sans font-bold">
         <div className="flex justify-between items-end mb-6">
            <div><h3 className="text-xl font-black text-emerald-950 uppercase tracking-tight">인사 프로필</h3><p className="text-[10px] text-gray-400 font-bold uppercase mt-0.5 tracking-widest">Employee Personal Record</p></div>
            <button onClick={() => setIsProfileModalOpen(true)} className="px-6 py-3 bg-gray-800 text-white text-[11px] font-black uppercase tracking-widest shadow-lg flex items-center gap-2 hover:bg-black active:scale-95 transition-all"><User size={16}/> Edit Profile</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-12 gap-6 font-bold">
            <div className="md:col-span-4 bg-white border border-gray-200 shadow-sm rounded-xl p-8 flex flex-col items-center">
               <div className="w-32 h-32 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-xl overflow-hidden mb-6 border-4 border-white">
                 {userProfile.profileImage ? <img src={userProfile.profileImage} className="w-full h-full object-cover" /> : userProfile.name.charAt(0)}
               </div>
               <h4 className="text-xl font-black text-gray-900">{userProfile.name}</h4>
               <div className="mt-4 px-4 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-100">{userProfile.dept} • {userProfile.position}</div>
               <div className="mt-8 pt-8 border-t border-gray-50 w-full flex flex-col items-center">
                  <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">대표 파트너 포켓몬</p>
                  <div className="w-24 h-24 bg-gray-50 rounded-xl border border-dashed border-gray-200 flex items-center justify-center overflow-hidden mb-3">
                     {leagueEntry[0]?.image ? <img src={leagueEntry[0].image} className="w-full h-full object-contain p-2" /> : <div className="text-gray-300 text-[10px] font-bold text-center p-4">데이터 없음</div>}
                  </div>
                  {/* 레벨 표시 추가 */}
                  <p className="text-[12px] font-black text-gray-800 uppercase tracking-tighter">
                    {leagueEntry[0]?.name || "No Partner"} 
                    {leagueEntry[0]?.name && <span className="ml-1 text-emerald-600">Lv.{leagueEntry[0]?.level}</span>}
                  </p>
               </div>
            </div>
            <div className="md:col-span-8 bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden font-bold">
               <div className="px-8 py-6 border-b border-gray-50 flex items-center gap-2"><ShieldCheck size={18} className="text-emerald-500" /><h4 className="font-black text-gray-800 text-xs uppercase tracking-widest">상세 근무 정보</h4></div>
               <div className="grid grid-cols-1 sm:grid-cols-2 border-b border-gray-50 font-bold">
                  {/* 변경된 상세 정보 항목 */}
                  <TableItem label="영문명" value={userProfile.englishName || '-'} />
                  <TableItem label="재직 상태" value={userProfile.status || '-'} />
                  <TableItem label="생년월일" value={userProfile.birthDate || '-'} />
                  <TableItem label="근무 위치" value={userProfile.location || '-'} />
                  <TableItem label="이메일" value={userProfile.email || '-'} />
                  <TableItem label="비상연락망" value={userProfile.emergencyContact || '-'} />
               </div>
               <div className="p-8 bg-gray-50/30">
                  <h5 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Clock size={12}/> 최근 신청 상태 요약</h5>
                  <div className="space-y-3 font-bold">
                     {userApplications.slice(0, 3).map(app => (
                        <div key={app.id} className="flex items-center justify-between p-3 bg-white border border-gray-100 rounded-lg shadow-sm font-bold">
                           <div className="flex items-center gap-3">
                              <div className="p-1.5 bg-gray-50 rounded-md"><FileText size={14} className="text-emerald-500" /></div>
                              <div><p className="text-[11px] font-black text-gray-800">{app.title}</p><p className="text-[9px] text-gray-400">{app.category} • {app.date}</p></div>
                           </div>
                           <span className={`text-[9px] font-black ${app.status === '완료' ? 'text-emerald-600' : 'text-indigo-600'}`}>{app.status}</span>
                        </div>
                     ))}
                  </div>
               </div>
            </div>
          </div>
      </div>
    );

    const NoticeDetailView = ({ notice, setCurrentPage }) => {
      if (!notice) return null;
      return (
        <div className="bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden animate-in fade-in duration-500 text-left font-sans font-bold">
          <div className="p-8 border-b border-gray-100">
            <button onClick={() => setCurrentPage('notices')} className="flex items-center gap-1 text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-6">
              <ChevronLeft size={14} /> 목록으로 돌아가기
            </button>
            <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-none border border-emerald-100 uppercase tracking-widest mb-3 inline-block">{notice.category}</span>
            <h2 className="text-2xl font-black text-gray-900 leading-tight mb-6">{notice.title}</h2>
            <div className="flex items-center gap-4 text-[11px] font-bold text-gray-400 uppercase tracking-tighter pt-4 border-t border-gray-50">
              <div className="flex items-center gap-2"><User size={12} className="text-emerald-500" /> {notice.author}</div>
              <div className="flex items-center gap-2"><CalendarIcon size={12} className="text-emerald-500" /> {notice.date}</div>
            </div>
          </div>
          <div className="p-8 md:p-12 text-sm font-medium leading-relaxed text-gray-600 whitespace-pre-line min-h-[300px] bg-gray-50/20 font-bold">
            {notice.content}
          </div>
          <div className="p-8 bg-gray-50/50 border-t border-gray-100 flex justify-end">
            <button onClick={() => setCurrentPage('notices')} className="px-10 py-3 bg-gray-800 text-white text-[11px] font-black rounded-none shadow-md uppercase tracking-widest">목록</button>
          </div>
        </div>
      );
    };

    const CertView = ({ userProfile, setCurrentPage }) => (
      <div className="animate-in fade-in duration-500 space-y-6 text-left font-sans font-bold">
        <div className="flex justify-between items-center mb-4"><h3 className="text-xl font-black text-gray-800 uppercase tracking-tight">재직증명서 발급</h3><button onClick={() => setCurrentPage('home')} className="text-xs font-bold text-gray-400 flex items-center gap-1"><ChevronLeft size={14}/> 홈으로</button></div>
        <div className="bg-white border border-gray-200 shadow-xl rounded-xl overflow-hidden p-6 md:p-10 lg:p-20 font-serif">
          <div className="max-w-[700px] mx-auto border-[10px] border-double border-black p-12 text-gray-900 bg-white">
            <h1 className="text-4xl font-bold text-center mb-20 tracking-[1.5rem] underline underline-offset-[12px] decoration-1">재직증명서</h1>
            <div className="space-y-0 border-t border-l border-black mb-24 text-sm md:text-base font-bold">
              {[ ["성       명", userProfile.name], ["직       위", userProfile.position], ["소       속", userProfile.dept], ["재 직 기 간", `${userProfile.joinDate} ~ 현재`] ].map(([label, value], idx) => (
                <div key={idx} className="flex border-b border-r border-black h-14 items-center">
                  <div className="w-40 bg-gray-50 h-full flex items-center justify-center border-r border-black font-bold uppercase">{label}</div>
                  <div className="flex-1 px-8 font-medium">{value}</div>
                </div>
              ))}
            </div>
            <div className="text-center space-y-16 mb-16 font-bold"><p className="text-xl font-medium leading-relaxed font-bold">상기인은 석영고원 포켓몬리그 본부의 규정에 의거하여 위와 같이 재직하고 있음을 증명함.</p></div>
            <div className="text-center border-t border-black/5 pt-10 font-bold"><h2 className="text-3xl font-bold tracking-tight">석영고원 포켓몬리그 본부 총재</h2></div>
          </div>
          <div className="mt-12 flex justify-center gap-4 font-sans"><button onClick={() => window.print()} className="px-10 py-4 bg-gray-800 text-white font-black text-sm rounded-xl flex items-center gap-2 active:scale-95 shadow-lg"><Printer size={18} /> 인쇄하기</button></div>
        </div>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
