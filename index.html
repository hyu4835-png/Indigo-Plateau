      const [notices] = useState([
        { id: 1, category: '행사', author: '운영본부', title: '하나리그 연계 신입 트레이너 연수 일정 안내', date: '2024-05-20', content: '안녕하십니까, 석영리그 본부 인사팀입니다. 제 28회 하나리그 연계 신입 트레이너 연수 일정에 관해 안내드리니, 3월 입사한 신입 트레이너 여러분들은 모두 참가할 수 있도록 각 팀에서 전달 바랍니다.\n일시: 4월 7일(화)\n장소: 하나지방 리버풀시티 체육관 및, 하나리그 본관', isNew: true },
        { id: 2, category: '기술', author: '안전관리팀', title: '[중요] 경기장 내 야생 포켓몬 출몰 주의보', date: '2024-05-18', content: '최근 경기장 외곽 제3구역에서 야생 노라키 무리가 자주 출몰하고 있습니다. 트레이너 및 임직원 여러분께서는 사고가 없도록 해당 위치 방문 시 파트너 포켓몬을 동행하시거나, 삐삐인형을 소지하시길 바랍니다. 각 팀의 삐삐인형이 소진된 경우 비품 신청으로 신청 바랍니다.', isNew: true },
        { id: 3, category: '업무', author: '트레이너팀', title: '신오지방 출장 근무 예정 안내', date: '2024-05-15', content: '신오지방 축제 관련하여 출장 근무가 예정되어 있습니다. 자세한 업무 내용은 각 팀으로 전달된 기술서 확인 바라며, 해당 기간에는 가급적 휴가 신청을 자제하여 주시기 바랍니다. 감사합니다.', isNew: false },
      ]);

      // -- 명시적 데이터 저장 로직 --
      const saveUserData = async (updates = {}) => {
        if (!user) return;
        const dataDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'userData', 'main');
        try {
          await setDoc(dataDoc, updates, { merge: true });
          // 프로필 업데이트 시 공개 디렉토리에도 동기화
          if (updates.userProfile) {
            const publicUserDoc = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
            await setDoc(publicUserDoc, {
              uid: user.uid,
              email: updates.userProfile.email,
              name: updates.userProfile.name,
              dept: updates.userProfile.dept,
              position: updates.userProfile.position,
              profileImage: updates.userProfile.profileImage || null
            }, { merge: true });
          }
        } catch (e) { console.error("Save error:", e); }
      };

      // -- Firebase 인증 감시 --
      useEffect(() => {
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            try {
              await signInWithCustomToken(auth, __initial_auth_token);
            } catch (e) { }
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (u) => {
          if (u && !u.isAnonymous) {
            setUser(u);
            setIsLoggedIn(true);
          } else {
            // 로그아웃 시 모든 데이터 초기화
            setUser(null);
            setIsLoggedIn(false);
            setUserProfile({ ...INITIAL_PROFILE });
            setProfileForm({ ...INITIAL_PROFILE });
            setTasks([]);
            setUserApplications([]);
            setLeagueEntry([...INITIAL_ENTRY]);
            setBattleGimmicks({ mega: false, zmove: false, dmax: false, tera: false });
            setPkmnList([]);
          }
          setIsAuthInitialized(true);
        });
        return () => unsubscribe();
      }, []);

      // -- 데이터 불러오기 --
      useEffect(() => {
        if (!user) return;
        const fetchData = async () => {
          const dataDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'userData', 'main');
          try {
            const snapshot = await getDoc(dataDoc);
            if (snapshot.exists()) {
              const data = snapshot.data();
              if (data.userProfile) {
                // 이전 데이터에 생년월일 등이 없을 경우를 대비하여 병합
                const loadedProfile = { ...INITIAL_PROFILE, ...data.userProfile };
                setUserProfile(loadedProfile);
                setProfileForm(loadedProfile); 
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { ...loadedProfile, uid: user.uid }, { merge: true });
              }
              if (data.tasks) setTasks(data.tasks);
              if (data.userApplications) setUserApplications(data.userApplications);
              if (data.leagueEntry) setLeagueEntry(data.leagueEntry);
              if (data.battleGimmicks) setBattleGimmicks(data.battleGimmicks);
              if (data.pkmnList) setPkmnList(data.pkmnList);
            }
          } catch(err) { console.error("Load error:", err); }
        };
        fetchData();
      }, [user]);

      // --- 공개 데이터 실시간 동기화 (메신저 용) ---
      useEffect(() => {
        if (!user) return;
        const usersUnsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), snap => {
          const arr = []; snap.forEach(d => arr.push(d.data())); setPublicUsers(arr);
        }, err => console.error(err));
        
        const chatsUnsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'chats'), snap => {
          const arr = []; snap.forEach(d => arr.push({ id: d.id, ...d.data() })); setAllChats(arr);
        }, err => console.error(err));

        const msgsUnsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), snap => {
          const arr = []; snap.forEach(d => arr.push({ id: d.id, ...d.data() })); setAllMessages(arr);
        }, err => console.error(err));

        return () => { usersUnsub(); chatsUnsub(); msgsUnsub(); };
      }, [user]);

      // --- 안 읽은 메신저 알림 배지 및 토스트 감지 로직 ---
      const prevMsgCount = useRef(0);
      useEffect(() => {
          if (!user) {
              prevMsgCount.current = 0;
              return;
          }
          if (allMessages.length === 0) return;
          
          if (prevMsgCount.current === 0) {
              prevMsgCount.current = allMessages.length;
              return;
          }

          if (allMessages.length > prevMsgCount.current) {
              const sortedMsgs = [...allMessages].sort((a,b) => a.timestamp - b.timestamp);
              const newMsgs = sortedMsgs.slice(prevMsgCount.current);
              
              newMsgs.forEach(msg => {
                  if (msg.senderId !== user.uid) {
                      // 내가 참여한 채팅방인지 확인
                      const isMyChat = allChats.some(c => c.id === msg.roomId && c.participants.includes(user.uid));
                      if (isMyChat) {
                          // 현재 메신저 창을 보고 있지 않거나, 다른 대화방을 보고 있을 때 알림
                          if (currentPage !== 'messenger' || activeChatId !== msg.roomId) {
                              const sender = publicUsers.find(u => u.uid === msg.senderId);
                              setToast({ show: true, message: `[메신저] ${sender?.name || '알 수 없음'}: ${msg.text}` });
                              setNotificationCount(prev => prev + 1);
                          }
                      }
                  }
              });
              prevMsgCount.current = allMessages.length;
          }
      }, [allMessages, user, allChats, publicUsers, currentPage, activeChatId]);


      // --- 메신저 로직 ---
      const handleCreateChat = async () => {
        if (!chatInputEmail.trim()) return;
        if (chatInputEmail === userProfile.email) {
          setToast({ show: true, message: "자신과는 대화할 수 없습니다." }); return;
        }
        const targetUser = publicUsers.find(u => u.email === chatInputEmail);
        if (!targetUser) {
          setToast({ show: true, message: "해당 이메일의 사용자를 찾을 수 없습니다." }); return;
        }
        const existingChat = allChats.find(c => c.participants && c.participants.includes(user.uid) && c.participants.includes(targetUser.uid));
        if (existingChat) {
          setActiveChatId(existingChat.id); setChatInputEmail(''); return;
        }
        const newChatId = `chat_${Date.now()}`;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chats', newChatId), {
            participants: [user.uid, targetUser.uid],
            createdAt: Date.now(),
            lastMessage: '',
            lastMessageTime: Date.now()
          });
          setActiveChatId(newChatId); setChatInputEmail('');
        } catch (e) { console.error(e); }
      };

      const handleSendMessage = async (e) => {
        if (e) e.preventDefault();
        if (!chatMessageInput.trim() || !activeChatId) return;
        const msgId = `msg_${Date.now()}_${Math.random().toString(36).substr(2,9)}`;
        const now = Date.now();
        const text = chatMessageInput;
        setChatMessageInput('');
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'messages', msgId), {
            roomId: activeChatId, senderId: user.uid, text: text, timestamp: now
          });
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chats', activeChatId), {
            lastMessage: text, lastMessageTime: now
          }, { merge: true });
        } catch(e) { console.error(e); }
      };
      
      const myChats = allChats.filter(c => c.participants && c.participants.includes(user?.uid)).sort((a,b) => b.lastMessageTime - a.lastMessageTime);

      // 시뮬레이션 알림
      useEffect(() => {
        if (!isLoggedIn) return;
        const interval = setInterval(() => {
          const pending = userApplications.filter(a => a.status === '처리중');
          if (pending.length === 0) return;
          const target = pending[Math.floor(Math.random() * pending.length)];
          setToast({ show: true, message: `[HQ 시스템] ${target.title} 처리가 완료되었습니다.` });
          setNotificationCount(c => c + 1);
          const nextApps = userApplications.map(a => a.id === target.id ? { ...a, status: '완료' } : a);
          setUserApplications(nextApps);
          saveUserData({ userApplications: nextApps });
          setTimeout(() => setToast({ show: false, message: '' }), 5000);
        }, 120000);
        return () => clearInterval(interval);
      }, [isLoggedIn, userApplications]);

      const [authForm, setAuthForm] = useState({ email: '', password: '' });
      const [authError, setAuthError] = useState('');

      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthError('');
        const { email, password } = authForm;

        if (!email || !password) {
          setAuthError('모든 필드를 입력해주세요.');
          return;
        }

        try {
          if (isSignUpMode) {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const newUser = userCredential.user;
            const initialData = {
              userProfile: { ...INITIAL_PROFILE, staffId: `#${email.split('@')[0]}`, name: email.split('@')[0], email: email },
              tasks: [{ id: Date.now(), title: '본부 시스템 가이드 숙지', status: '진행중', types: ['내 업무'], priority: '보통' }],
              userApplications: [],
              leagueEntry: [...INITIAL_ENTRY],
              battleGimmicks: { mega: false, zmove: false, dmax: false, tera: false },
              pkmnList: []
            };
            await setDoc(doc(db, 'artifacts', appId, 'users', newUser.uid, 'userData', 'main'), initialData);
          } else {
            await signInWithEmailAndPassword(auth, email, password);
          }
        } catch (err) {
          if (err.code === 'auth/user-not-found') setAuthError('등록되지 않은 사용자입니다.');
          else if (err.code === 'auth/wrong-password') setAuthError('비밀번호가 일치하지 않습니다.');
          else if (err.code === 'auth/invalid-email') setAuthError('올바른 이메일 형식이 아닙니다.');
          else if (err.code === 'auth/email-already-in-use') setAuthError('이미 사용 중인 이메일입니다.');
          else if (err.code === 'auth/too-many-requests') setAuthError('로그인 시도가 너무 많습니다. 잠시 후 시도하세요.');
          else setAuthError('인증 과정에서 오류가 발생했습니다.');
        }
      };

      const logout = async () => {
        await signOut(auth);
        setCurrentPage('home'); 
        setNotificationCount(0);
      };

      const handleServiceClick = (id) => {
        if (id === 'external') window.open('https://the8arc.tistory.com/', '_blank');
        else { setCurrentPage(id); setIsSidebarOpen(false); }
      };

      if (!isAuthInitialized) return (
        <div className="min-h-screen flex items-center justify-center bg-emerald-50/50 p-4">
          <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      );

      if (!isLoggedIn) return (
        <div className="min-h-screen flex items-center justify-center bg-emerald-50/50 p-4 font-sans text-left">
          <div className="bg-white p-12 shadow-2xl w-full max-w-sm text-center border border-emerald-100 animate-in zoom-in">
            <div className="w-20 h-20 bg-emerald-500 rounded-none flex items-center justify-center mx-auto mb-8 text-white shadow-xl rotate-3 transition-transform hover:rotate-0"><LayoutDashboard size={40} /></div>
            <h1 className="text-2xl font-black text-emerald-950 tracking-tighter uppercase">석영고원 리그 본부</h1>
            <p className="text-emerald-600 mt-1 text-[11px] font-black uppercase tracking-[0.2em] mb-8">Official Auth System</p>
            <>
              <div className="mb-6 flex bg-gray-100 p-1 rounded-lg font-black">
                <button onClick={() => { setIsSignUpMode(false); setAuthError(''); }} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-md transition-all ${!isSignUpMode ? 'bg-white shadow-sm text-emerald-600' : 'text-gray-400'}`}>Login</button>
                <button onClick={() => { setIsSignUpMode(true); setAuthError(''); }} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-md transition-all ${isSignUpMode ? 'bg-white shadow-sm text-emerald-600' : 'text-gray-400'}`}>Sign Up</button>
              </div>
              <form className="space-y-3 font-bold" onSubmit={handleAuth}>
                <input type="email" className="w-full px-6 py-4 text-sm border-none bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none font-bold shadow-inner rounded-none" placeholder="Staff Email (이메일)" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} />
                <input type="password" title="password" className="w-full px-6 py-4 text-sm border-none bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none font-bold shadow-inner rounded-none" placeholder="Password (비밀번호)" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} />
                {authError && <p className="text-[10px] font-bold text-red-500 mt-2">{authError}</p>}
                <button className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-none shadow-lg mt-4 uppercase text-[12px] active:scale-95 transition-all flex items-center justify-center gap-2">
                  {isSignUpMode ? <><UserPlus size={16}/> Create Account</> : <><LogIn size={16}/> Sign In</>}
                </button>
              </form>
            </>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-[#f9fafb] flex flex-col font-sans text-sm antialiased text-gray-800 overflow-x-hidden">
          <Sidebar isSidebarOpen={isSidebarOpen} setIsSidebarOpen={setIsSidebarOpen} currentPage={currentPage} setCurrentPage={setCurrentPage} isServiceMenuOpen={isServiceMenuOpen} setIsServiceMenuOpen={setIsServiceMenuOpen} userProfile={userProfile} handleServiceClick={handleServiceClick} logout={logout} />
          
          <div className="flex-1 flex flex-col transition-all duration-300">
            <header className="h-16 bg-white/70 backdrop-blur-md border-b border-gray-100 px-8 flex items-center justify-between sticky top-0 z-30 font-bold">
              <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-emerald-600 active:scale-90 transition-transform"><Menu size={24} /></button>
              <div className="flex items-center gap-5">
                 <button className="relative p-2 text-gray-400 hover:text-emerald-500 transition-colors" onClick={() => setNotificationCount(0)}>
                    <Bell size={22}/>
                    {notificationCount > 0 && <div className="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-[9px] font-black rounded-full flex items-center justify-center border-2 border-white animate-bounce">{notificationCount}</div>}
                 </button>
                 <button onClick={() => setCurrentPage('profile')} className="w-9 h-9 rounded-full border-2 border-emerald-500 p-0.5 overflow-hidden shadow-sm hover:scale-105 transition-transform">
                    {userProfile.profileImage ? <img src={userProfile.profileImage} className="w-full h-full object-cover rounded-full" /> : <div className="w-full h-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold rounded-full">{userProfile.name.charAt(0)}</div>}
                 </button>
              </div>
            </header>

            <main className="p-8 max-w-6xl mx-auto w-full flex-1">
               {currentPage === 'home' && <HomeView userProfile={userProfile} tasks={tasks} notices={notices} handleServiceClick={handleServiceClick} setCurrentPage={setCurrentPage} setSelectedNotice={setSelectedNotice} logout={logout} userApplications={userApplications} notificationCount={notificationCount} myChats={myChats} publicUsers={publicUsers} user={user} setActiveChatId={setActiveChatId} />}
               {currentPage === 'profile' && <ProfileView userProfile={userProfile} setIsProfileModalOpen={setIsProfileModalOpen} userApplications={userApplications} leagueEntry={leagueEntry} />}
               {currentPage === 'tasks' && <TasksView tasks={tasks} taskFilter={taskFilter} setTaskFilter={setTaskFilter} openTaskModal={(mode, t) => { setModalMode(mode); setFormState(t || { id: null, title: '', status: '대기', types: ['내 업무'], department: '', priority: '보통' }); setIsTaskModalOpen(true); }} />}
               {currentPage === 'messenger' && <MessengerView user={user} publicUsers={publicUsers} myChats={myChats} allMessages={allMessages} activeChatId={activeChatId} setActiveChatId={setActiveChatId} chatInputEmail={chatInputEmail} setChatInputEmail={setChatInputEmail} handleCreateChat={handleCreateChat} chatMessageInput={chatMessageInput} setChatMessageInput={setChatMessageInput} handleSendMessage={handleSendMessage} />}
               {currentPage === 'conduct' && <ConductView setCurrentPage={setCurrentPage} />}
               {currentPage === 'stadium' && <LiveStadiumView setCurrentPage={setCurrentPage} />}

               {currentPage === 'notices' && (
                  <div className="space-y-4 font-sans text-left animate-in fade-in duration-500"><h3 className="text-xl font-black text-emerald-950 uppercase">전체 공지사항</h3>
                    <div className="bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden divide-y divide-gray-100">
                      {notices.map(n => (<div key={n.id} onClick={() => { setSelectedNotice(n); setCurrentPage('noticeDetail'); }} className="p-6 flex justify-between items-center hover:bg-emerald-50/20 cursor-pointer group transition-colors font-bold"><div className="flex flex-col"><div className="flex items-center gap-2 mb-1 font-bold"><span className="text-[9px] font-black border border-emerald-200 text-emerald-600 px-1.5 py-0.5 uppercase tracking-widest">{n.category}</span></div><h4 className="font-black text-gray-800 group-hover:text-emerald-700">{n.title}</h4><span className="text-[10px] text-gray-400 font-bold mt-1 uppercase tracking-tighter">{n.author} • {n.date}</span></div><ChevronRight size={18} className="text-gray-300 group-hover:translate-x-1 group-hover:text-emerald-500 transition-all"/></div>))}
                    </div>
                  </div>
               )}
               {currentPage === 'noticeDetail' && <NoticeDetailView notice={selectedNotice} setCurrentPage={setCurrentPage} />}

               {currentPage === 'entry' && (
                  <div className="animate-in fade-in duration-500 space-y-6 text-left font-sans font-bold">
                    <div className="flex justify-between items-end mb-4">
                      <div>
                        <h3 className="text-xl font-black text-emerald-950 uppercase tracking-tight">리그 엔트리 등록</h3>
                        <p className="text-[10px] text-gray-400 font-bold uppercase mt-0.5 tracking-widest">Official Battle Entry</p>
                      </div>
                      <div className="flex items-center gap-4">
                        <button onClick={async () => {
                           await saveUserData({ leagueEntry, battleGimmicks });
                           setToast({ show: true, message: "엔트리 정보가 데이터베이스에 저장되었습니다." });
                        }} className="px-4 py-2.5 bg-emerald-600 text-white text-[11px] font-black uppercase tracking-widest shadow-lg flex items-center gap-1.5 rounded-lg hover:bg-emerald-700 active:scale-95 transition-all"><Check size={14}/> 엔트리 저장</button>
                        <button onClick={() => setCurrentPage('home')} className="text-xs font-bold text-gray-400 hover:text-emerald-600 flex items-center gap-1"><ChevronLeft size={14}/> 홈으로</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 border border-gray-200 shadow-xl bg-white rounded-xl overflow-hidden">
                      {leagueEntry.map((p, idx) => (
                        <div key={idx} className="flex flex-col border-r last:border-r-0 border-gray-200 group">
                          <div className="aspect-square relative flex items-center justify-center p-4 transition-colors duration-500 font-bold" style={{ backgroundColor: TYPE_COLORS[p.type1] || TYPE_COLORS['선택'] }}>
                            <div className="w-full h-full bg-white/40 backdrop-blur-sm border border-white/20 flex items-center justify-center overflow-hidden font-bold">{p.image ? <img src={p.image} className="w-full h-full object-contain" /> : <div className="text-4xl text-white/50 font-black">?</div>}</div>
                            <label className="absolute inset-0 bg-black/40 text-white flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity z-10"><Camera size={24} /><input type="file" className="hidden" accept="image/*" onChange={(e) => {
                              const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onloadend = () => { const next = [...leagueEntry]; next[idx].image = r.result; setLeagueEntry(next); }; r.readAsDataURL(f); }
                            }} /></label>
                          </div>
                          <div className="p-3 border-b border-gray-100 text-center bg-gray-50/50 font-bold">
                            <input type="text" placeholder="이름" className="w-full bg-transparent text-center font-black text-[11px] outline-none" value={p.name} onChange={(e) => { const next = [...leagueEntry]; next[idx].name = e.target.value; setLeagueEntry(next); }} />
                            <div className="flex items-center justify-center gap-1 mt-1 font-bold"><span className="text-[9px] text-gray-400">Lv.</span><input type="number" className="w-8 bg-transparent text-[9px] font-black text-gray-600 outline-none" value={p.level} onChange={(e) => { const next = [...leagueEntry]; next[idx].level = e.target.value; setLeagueEntry(next); }} /></div>
                          </div>
                          <div className="p-3 border-b border-gray-100 bg-white space-y-1.5 font-bold">
                            <select className="w-full py-1 rounded-md text-[8px] font-black text-white text-center appearance-none outline-none cursor-pointer" style={{ backgroundColor: TYPE_COLORS[p.type1] }} value={p.type1} onChange={(e) => { const next = [...leagueEntry]; next[idx].type1 = e.target.value; setLeagueEntry(next); }}>{Object.keys(TYPE_COLORS).map(t => <option key={t} value={t} className="text-gray-800 bg-white">{t}</option>)}</select>
                            <select className="w-full py-1 rounded-md text-[8px] font-black text-white text-center appearance-none outline-none cursor-pointer" style={{ backgroundColor: TYPE_COLORS[p.type2] || TYPE_COLORS['없음'] }} value={p.type2} onChange={(e) => { const next = [...leagueEntry]; next[idx].type2 = e.target.value; setLeagueEntry(next); }}>{Object.keys(TYPE_COLORS).map(t => <option key={t} value={t} className="text-gray-800 bg-white">{t}</option>)}</select>
                          </div>
                          <div className="p-3 border-b border-gray-100 bg-gray-50/30 font-bold"><input type="text" placeholder="특성" className="w-full bg-transparent text-center text-[9px] font-bold outline-none" value={p.ability} onChange={(e) => { const next = [...leagueEntry]; next[idx].ability = e.target.value; setLeagueEntry(next); }} /></div>
                          <div className="p-3 border-b border-gray-100 bg-white font-bold"><input type="text" placeholder="아이템" className="w-full bg-transparent text-center text-[9px] font-bold text-emerald-700 outline-none" value={p.item} onChange={(e) => { const next = [...leagueEntry]; next[idx].item = e.target.value; setLeagueEntry(next); }} /></div>
                          <div className="p-3 flex-1 bg-gray-50/20 font-black space-y-1 font-bold">
                            {p.moves.map((move, mIdx) => (<input key={mIdx} type="text" placeholder={`기술 ${mIdx + 1}`} className="w-full bg-white border-b border-gray-100 px-1 py-1 text-center text-[9px] text-indigo-900 outline-none font-bold" value={move} onChange={(e) => { const next = [...leagueEntry]; next[idx].moves[mIdx] = e.target.value; setLeagueEntry(next); }} />))}
                          </div>
                        </div>
                      ))}
                    </div>
                    
                    <div className="mt-6 bg-white border border-gray-200 shadow-xl rounded-xl p-6 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                       <div>
                          <h4 className="font-black text-gray-800 text-xs uppercase tracking-widest mb-1">사용 배틀 기믹 등록</h4>
                          <p className="text-[10px] text-gray-400 font-bold">공식전에서 사용할 배틀 기믹을 선택하세요. (복수 선택 가능)</p>
                       </div>
                       <div className="flex flex-wrap gap-4 font-bold">
                          {[
                            { id: 'mega', label: '메가진화' },
                            { id: 'zmove', label: 'Z기술' },
                            { id: 'dmax', label: '다이맥스' },
                            { id: 'tera', label: '테라스탈' }
                          ].map(g => (
                            <label key={g.id} className="flex items-center gap-2 cursor-pointer group" onClick={(e) => { e.preventDefault(); setBattleGimmicks({...battleGimmicks, [g.id]: !battleGimmicks[g.id]}); }}>
                               <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${battleGimmicks[g.id] ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-gray-50 border-gray-300 text-transparent group-hover:border-emerald-400'}`}>
                                  <Check size={14} />
                               </div>
                               <span className="text-[11px] text-gray-700 select-none">{g.label}</span>
                            </label>
                          ))}
                       </div>
                    </div>
                  </div>
               )}

               {currentPage === 'center' && (() => {
                  const cYear = calendarDate.getFullYear();
                  const cMonth = calendarDate.getMonth();
                  const daysInMonth = new Date(cYear, cMonth + 1, 0).getDate();
                  const firstDay = new Date(cYear, cMonth, 1).getDay();
                  const prevMonth = () => setCalendarDate(new Date(cYear, cMonth - 1, 1));
                  const nextMonth = () => setCalendarDate(new Date(cYear, cMonth + 1, 1));

                  return (
                     <div className="max-w-5xl mx-auto animate-in fade-in duration-500 space-y-6 text-left font-sans relative font-bold">
                       <div className="flex justify-between items-center mb-2 font-bold"><div><h3 className="text-xl font-black text-emerald-950 uppercase tracking-tight">사내 포켓몬센터 예약</h3><p className="text-[10px] text-gray-400 font-bold uppercase mt-0.5 tracking-widest">Pokemon Center Service</p></div><button onClick={() => setCurrentPage('home')} className="text-xs font-bold text-gray-400 hover:text-emerald-600 flex items-center gap-1 font-bold"><ChevronLeft size={14}/> 홈으로</button></div>
                       <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                         
                         {/* Calendar Section */}
                         <div className="lg:col-span-5 bg-white border border-gray-200 shadow-sm rounded-xl p-6 font-bold flex flex-col">
                           <div className="flex justify-between items-center mb-5 font-bold">
                              <h4 className="font-black text-gray-800 text-xs flex items-center gap-2">
                                 <button onClick={prevMonth} className="p-1 hover:bg-gray-100 rounded text-gray-500"><ChevronLeft size={14}/></button>
                                 {cYear}년 {cMonth + 1}월
                                 <button onClick={nextMonth} className="p-1 hover:bg-gray-100 rounded text-gray-500"><ChevronRight size={14}/></button>
                              </h4>
                              {selectedCenterDate && <span className="text-[9px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded">선택됨: {selectedCenterDate}</span>}
                           </div>
                           <div className="grid grid-cols-7 gap-1.5 font-bold flex-1">
                             {["일", "월", "화", "수", "목", "금", "토"].map(d => <div key={d} className="text-center text-[9px] font-black text-gray-300 py-1 uppercase">{d}</div>)}
                             {Array(firstDay).fill(null).map((_, i) => <div key={`empty-${i}`} />)}
                             {Array.from({ length: daysInMonth }).map((_, i) => {
                               const day = i + 1;
                               const dateStr = `${cYear}-${String(cMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                               const hasMyReservation = userApplications.some(a => a.category === '센터' && a.date === dateStr);
                               const isSelected = selectedCenterDate === dateStr;
                               return (
                                 <button key={i} onClick={() => setSelectedCenterDate(dateStr)} className={`aspect-square rounded-lg border flex flex-col items-center justify-center transition-all ${isSelected ? 'ring-2 ring-emerald-500 border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm' : hasMyReservation ? 'bg-emerald-50/50 border-emerald-200 text-emerald-600 shadow-inner' : 'bg-gray-50 border-gray-100 text-gray-400 hover:bg-white hover:border-emerald-200'} font-bold`}>
                                   <span className="text-[11px] font-bold">{day}</span>
                                   {hasMyReservation && <div className="w-1.5 h-1.5 bg-emerald-600 rounded-full mt-0.5 font-bold"></div>}
                                 </button>
                               );
                             })}
                           </div>
                         </div>
                         
                         {/* Deposited Pokemon Status Section (연동된 엔트리 예약) */}

                           <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-4"><Stethoscope size={16} className="text-red-500" /><h4 className="font-black text-gray-800 text-xs">엔트리 기반 예약 관리</h4></div>
                           
                           <div className="grid grid-cols-6 gap-2 mb-6 flex-1 min-w-0">
                              {leagueEntry.map((pkmn, idx) => {
                                 const isSelected = depositSelection[idx];
                                 return (
                                    <div key={idx} className="flex flex-col items-center gap-2 min-w-0">
                                       <div className={`w-full aspect-square rounded-lg border transition-all relative overflow-hidden flex items-center justify-center cursor-pointer ${isSelected ? 'border-emerald-500 ring-2 ring-emerald-500 shadow-md' : 'border-gray-200 hover:border-emerald-300'}`} style={{ backgroundColor: TYPE_COLORS[pkmn.type1] || '#f9fafb' }} onClick={() => { const next = [...depositSelection]; next[idx] = !next[idx]; setDepositSelection(next); }}>
                                          <div className="absolute inset-0 bg-white/40 backdrop-blur-[2px]"></div>
                                          {pkmn.image ? <img src={pkmn.image} className="w-full h-full object-contain relative z-10 p-1" /> : <div className="text-black/30 text-[10px] font-black relative z-10 text-center leading-tight">{pkmn.name || '?'}</div>}
                                       </div>
                                       <div className="text-center w-full px-1">
                                          <p className="text-[9px] font-black text-gray-800 truncate">{pkmn.name || '미등록'}</p>
                                          <div className="mt-1 flex items-center justify-center">
                                             <label className="flex items-center gap-1 cursor-pointer group" onClick={(e) => { e.preventDefault(); const next = [...depositSelection]; next[idx] = !next[idx]; setDepositSelection(next); }}>
                                                <div className={`w-3 h-3 rounded-[3px] border flex items-center justify-center transition-colors ${isSelected ? 'bg-emerald-500 border-emerald-500 text-white flex-shrink-0' : 'bg-gray-100 border-gray-300 text-transparent group-hover:border-emerald-400 flex-shrink-0'}`}><Check size={8} strokeWidth={4} /></div>
                                                <span className="text-[8px] font-bold text-gray-500 truncate hidden sm:inline">맡기기</span>
                                             </label>
                                          </div>
                                       </div>
                                    </div>
                                 );
                              })}
                           </div>
                           
                           <button onClick={async () => {
                              if (!selectedCenterDate) { setToast({show:true, message:'예약할 날짜를 달력에서 먼저 선택해주세요.'}); return; }
                              const selectedNames = leagueEntry.filter((p, i) => depositSelection[i]).map(p => p.name || '미등록').join(', ');
                              if (!selectedNames) { setToast({show:true, message:'맡길 포켓몬을 하나 이상 선택해주세요.'}); return; }
                              
                              const newApp = { id: Date.now(), category: '센터', title: `포켓몬 치료 예약 (${selectedNames})`, date: selectedCenterDate, status: '처리중' };
                              const nextApps = [newApp, ...userApplications];
                              setUserApplications(nextApps);
                              await saveUserData({ userApplications: nextApps });
                              setDepositSelection([false,false,false,false,false,false]);
                              setSelectedCenterDate(null);
                              setToast({show:true, message:'포켓몬 센터 예약이 완료되었습니다.'});
                              setCurrentPage('home');
                           }} className={`w-full py-3 rounded-xl text-[11px] font-black uppercase shadow-lg transition-all ${selectedCenterDate && depositSelection.some(Boolean) ? 'bg-emerald-600 text-white active:scale-95 hover:bg-emerald-700' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                              선택 항목 예약 완료
                           </button>
                         </div>
                       </div>
                     </div>
                  );
               })()}

               {currentPage === 'package' && (
                  <div className="max-w-4xl mx-auto animate-in fade-in duration-500 space-y-6 text-left font-sans font-bold">
                     <div className="flex justify-between items-center mb-2 font-bold"><div><h3 className="text-xl font-black text-emerald-950 uppercase tracking-tight">비품 신청 서비스</h3><p className="text-[10px] text-gray-400 font-bold uppercase mt-0.5 tracking-widest">Supply Request Portal</p></div><button onClick={() => setCurrentPage('home')} className="text-xs font-bold text-gray-400 hover:text-emerald-600 flex items-center gap-1 font-bold"><ChevronLeft size={14}/> 홈으로</button></div>
                     <div className="bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden grid grid-cols-1 md:grid-cols-12 font-bold">
                       <div className="md:col-span-8 p-8 border-r border-gray-100 space-y-8 max-h-[500px] overflow-y-auto scrollbar-hide font-bold">
                          {Object.entries(ITEM_LIST).map(([cat, items]) => (
                             <div key={cat}><h4 className="text-[11px] font-black text-emerald-600 mb-4 uppercase tracking-widest border-l-4 border-emerald-500 pl-2 font-bold">{cat}</h4>
                                <div className="flex flex-wrap gap-2 font-bold">{items.map(item => {
                                   const isSelected = formState.title.includes(item);
                                   return (<button key={item} onClick={() => {
                                      const titles = formState.title ? formState.title.split(', ') : [];
                                      let nextTitles;
                                      if(titles.includes(item)) nextTitles = titles.filter(t => t !== item);
                                      else if(titles.length < 3) nextTitles = [...titles, item];
                                      else return;
                                      setFormState({...formState, title: nextTitles.join(', ')});
                                   }} className={`px-3 py-2 text-[11px] font-bold border rounded-lg transition-all ${isSelected ? 'bg-emerald-500 border-emerald-500 text-white shadow-md' : 'bg-white border-gray-100 text-gray-500 hover:border-emerald-200'}`}>{item}</button>);
                                })}</div>
                             </div>
                          ))}
                       </div>
                       <div className="md:col-span-4 bg-gray-50/50 p-8 flex flex-col justify-between font-bold">
                          <div className="space-y-6">
                            <label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">신청 목록 (최대 3개)</label>
                            <div className="space-y-2 min-h-[100px] font-bold">{formState.title.split(', ').filter(x=>x).map((item, idx) => (<div key={idx} className="flex items-center justify-between bg-white px-3 py-2 rounded-lg border border-emerald-100 text-[11px] font-bold text-emerald-700 animate-in slide-in-from-left-2"><span>{item}</span><X size={14} className="text-gray-300 hover:text-red-500 cursor-pointer" onClick={() => { const titles = formState.title.split(', ').filter(t => t !== item); setFormState({...formState, title: titles.join(', ')}); }}/></div>))}{!formState.title && <p className="text-[10px] text-gray-300 italic pt-2">아이템을 선택하세요.</p>}</div>
                          </div>
                          <button onClick={async () => {
                             if(!formState.title) return;
                             const newApp = { id: Date.now(), category: '비품', title: formState.title, date: new Date().toISOString().split('T')[0], status: '처리중' };
                             const nextApps = [newApp, ...userApplications];
                             setUserApplications(nextApps); await saveUserData({ userApplications: nextApps }); setFormState({...formState, title: ''}); setCurrentPage('home');
                          }} className="w-full py-4 bg-gray-900 text-white rounded-xl text-[11px] font-black uppercase shadow-lg active:scale-95 transition-all">비품 신청하기</button>
                       </div>
                     </div>
                  </div>
               )}

               {currentPage === 'cert' && <CertView userProfile={userProfile} setCurrentPage={setCurrentPage} />}
            </main>
            <Footer setCurrentPage={setCurrentPage} />
          </div>

          <Modals 
            isTaskModalOpen={isTaskModalOpen} setIsTaskModalOpen={setIsTaskModalOpen} 
            modalMode={modalMode} formState={formState} setFormState={setFormState} 
            tasks={tasks} setTasks={setTasks} saveUserData={saveUserData} setToast={setToast} 
            isProfileModalOpen={isProfileModalOpen} setIsProfileModalOpen={setIsProfileModalOpen}
            profileForm={profileForm} setProfileForm={setProfileForm} setUserProfile={setUserProfile}
            confirmModal={confirmModal} setConfirmModal={setConfirmModal} userApplications={userApplications} setUserApplications={setUserApplications}
          />
          {toast.show && <Toast toast={toast} setToast={setToast} />}
        </div>
      );
    };

    // -- 하위 헬퍼 컴포넌트들 --

    const Sidebar = ({ isSidebarOpen, setIsSidebarOpen, currentPage, setCurrentPage, isServiceMenuOpen, setIsServiceMenuOpen, userProfile, handleServiceClick, logout }) => (
      <>
        {isSidebarOpen && <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[40]" onClick={() => setIsSidebarOpen(false)} />}
        <aside className={`fixed inset-y-0 left-0 w-64 bg-white border-r border-gray-100 z-[50] flex flex-col transform transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
          <div className="p-6 flex items-center justify-between border-b border-gray-50 flex-shrink-0 font-bold">
            <div className="flex items-center gap-3"><div className="w-8 h-8 bg-emerald-500 flex items-center justify-center text-white"><LayoutDashboard size={18} /></div><span className="font-black text-emerald-900 text-sm uppercase tracking-tighter">석영고원 HQ</span></div>
            <button onClick={() => setIsSidebarOpen(false)} className="text-gray-400 hover:text-emerald-600 transition-colors font-bold"><X size={24} /></button>
          </div>
          <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto font-bold text-[12px] text-left scrollbar-hide">
            <NavItem icon={<LayoutDashboard size={18} />} label="홈 화면" id="home" currentPage={currentPage} setCurrentPage={setCurrentPage} setIsSidebarOpen={setIsSidebarOpen} />
            <NavItem icon={<ClipboardList size={18} />} label="업무 관리" id="tasks" currentPage={currentPage} setCurrentPage={setCurrentPage} setIsSidebarOpen={setIsSidebarOpen} />
            <NavItem icon={<MessageSquare size={18} />} label="사내 메신저" id="messenger" currentPage={currentPage} setCurrentPage={setCurrentPage} setIsSidebarOpen={setIsSidebarOpen} />
            <div>
              <button onClick={() => setIsServiceMenuOpen(!isServiceMenuOpen)} className={`flex items-center justify-between px-4 py-3 w-full transition-all ${isServiceMenuOpen ? 'bg-emerald-50 text-emerald-600' : 'text-gray-500 hover:bg-emerald-50'}`}>
                <div className="flex items-center gap-3 font-bold"><Grid size={18} /><span>서비스</span></div><ChevronDown size={14} className={`transition-transform ${isServiceMenuOpen ? 'rotate-180' : ''}`} />
              </button>
              {isServiceMenuOpen && (
                <div className="mt-1 ml-4 border-l-2 border-emerald-100 space-y-1 font-bold">
                  {SERVICE_SUB_MENUS.map((sub, idx) => (
                    <button key={idx} onClick={() => handleServiceClick(sub.id)} className="flex items-center gap-2 px-6 py-2 w-full text-[11px] text-gray-500 hover:text-emerald-600 text-left font-bold transition-colors">• {sub.label.replace('\n', ' ')}</button>
                  ))}
                </div>
              )}
            </div>
            <NavItem icon={<Bell size={18} />} label="공지사항" id="notices" currentPage={currentPage} setCurrentPage={setCurrentPage} setIsSidebarOpen={setIsSidebarOpen} />
          </nav>
          <div className="p-4 border-t border-gray-50 bg-gray-50/50 text-left flex-shrink-0 font-bold">
            <button onClick={() => { setCurrentPage('profile'); setIsSidebarOpen(false); }} className="flex items-center gap-3 px-3 py-3 w-full rounded-none hover:bg-emerald-50 transition-colors">
              <div className="w-8 h-8 bg-white border border-emerald-100 rounded-full flex items-center justify-center overflow-hidden shadow-sm">{userProfile.profileImage ? <img src={userProfile.profileImage} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold rounded-full">{userProfile.name.charAt(0)}</div>}</div>
              <div className="flex-1 overflow-hidden ml-1 font-bold"><p className="font-black text-[11px] text-gray-800 truncate">{userProfile.name}</p><p className="text-[9px] text-gray-400 truncate tracking-tighter font-bold">{userProfile.dept}</p></div>
            </button>
            <button onClick={logout} className="flex items-center gap-3 px-3 py-2 w-full text-red-500 hover:bg-red-50 text-[10px] font-black uppercase mt-2 tracking-widest transition-colors font-bold"><LogOut size={14} /><span>Logout</span></button>
          </div>
        </aside>
      </>
    );

    const Modals = ({ isTaskModalOpen, setIsTaskModalOpen, modalMode, formState, setFormState, tasks, setTasks, saveUserData, setToast, isProfileModalOpen, setIsProfileModalOpen, profileForm, setProfileForm, setUserProfile, confirmModal, setConfirmModal, userApplications, setUserApplications }) => (
      <>
        {isTaskModalOpen && (
          <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] flex items-center justify-center p-4 font-sans font-bold">
            <div className="bg-white rounded-xl w-full max-w-md p-8 flex flex-col max-h-[90vh] shadow-2xl animate-in zoom-in-95">
              <div className="flex justify-between items-center mb-6">
                <h3 className="font-black text-emerald-950 uppercase text-sm tracking-widest">{modalMode === 'add' ? '새 업무 등록' : '업무 정보 수정'}</h3>
                <button onClick={() => setIsTaskModalOpen(false)} className="text-gray-400 hover:text-red-500"><X size={20}/></button>
              </div>
              <div className="flex-1 overflow-y-auto space-y-6 text-left scrollbar-hide font-bold">
                <section><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">업무 성격 선택</label>
                  <div className="flex gap-2 font-bold">{['내 업무', '부서 업무'].map(type => (<button key={type} onClick={() => { const newTypes = formState.types.includes(type) ? formState.types.filter(t => t !== type) : [...formState.types, type]; setFormState({ ...formState, types: newTypes, department: !newTypes.includes('부서 업무') ? '' : formState.department }); }} className={`flex-1 py-3 px-3 rounded-xl border-2 text-[11px] font-black transition-all ${formState.types.includes(type) ? 'bg-emerald-50 border-emerald-500 text-emerald-700 shadow-inner' : 'bg-white border-gray-100 text-gray-300'}`}>{type}</button>))}</div>
                </section>
                <section className="space-y-4 font-bold">
                  <div><label className="block text-[10px] font-black mb-2 uppercase tracking-widest ml-1 text-gray-400">부서 지정</label>

                  </div>
                  <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">업무 명칭</label><input type="text" placeholder="수행 업무를 입력하세요." className="w-full px-4 py-3 text-xs border border-gray-200 rounded-xl outline-none font-black" value={formState.title} onChange={(e) => setFormState({...formState, title: e.target.value})} /></div>
                </section>
                <div className="grid grid-cols-2 gap-4 font-bold">
                  <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">상태</label><select className="w-full px-4 py-3 text-xs border border-gray-200 rounded-xl font-black bg-white outline-none" value={formState.status} onChange={(e) => setFormState({...formState, status: e.target.value})}><option>대기</option><option>진행중</option><option>완료</option></select></div>
                  <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">우선순위</label><select className="w-full px-4 py-3 text-xs border border-gray-200 rounded-xl font-black bg-white outline-none" value={formState.priority} onChange={(e) => setFormState({...formState, priority: e.target.value})}><option>낮음</option><option>보통</option><option>높음</option><option>긴급</option></select></div>

              <div className="flex-1 overflow-y-auto space-y-6 text-left scrollbar-hide px-2 font-bold">
                <div className="flex justify-center mb-6"><div className="w-24 h-24 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center overflow-hidden cursor-pointer hover:border-emerald-500 transition-colors" onClick={() => document.getElementById('p-up').click()}>{profileForm.profileImage ? <img src={profileForm.profileImage} className="w-full h-full object-cover" /> : <Camera size={24} className="text-gray-300"/>}</div><input id="p-up" type="file" className="hidden" accept="image/*" onChange={e => { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onloadend = () => setProfileForm({...profileForm, profileImage: r.result}); r.readAsDataURL(f); } }} /></div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <EditInput label="이름" value={profileForm.name} onChange={(v) => setProfileForm({...profileForm, name: v})} />
                  <EditInput label="영문명" value={profileForm.englishName} onChange={(v) => setProfileForm({...profileForm, englishName: v})} />
                  <EditInput label="생년월일" value={profileForm.birthDate} onChange={(v) => setProfileForm({...profileForm, birthDate: v})} />
                  <EditInput label="소속 부서" value={profileForm.dept} onChange={(v) => setProfileForm({...profileForm, dept: v})} />
                  <EditInput label="직급" value={profileForm.position} onChange={(v) => setProfileForm({...profileForm, position: v})} />
                  <EditInput label="근무 위치" value={profileForm.location} onChange={(v) => setProfileForm({...profileForm, location: v})} />
                  <EditInput label="이메일" value={profileForm.email} onChange={(v) => setProfileForm({...profileForm, email: v})} />
                  <EditInput label="비상연락망" value={profileForm.emergencyContact} onChange={(v) => setProfileForm({...profileForm, emergencyContact: v})} />
                </div>

              </div>
              <div className="pt-8 flex gap-3 font-bold"><button onClick={() => setIsProfileModalOpen(false)} className="flex-1 py-4 text-gray-400 font-black text-[11px] uppercase tracking-widest">취소</button><button onClick={async () => { setUserProfile(profileForm); await saveUserData({ userProfile: profileForm }); setIsProfileModalOpen(false); setToast({ show: true, message: "인사 정보 업데이트 완료" }); }} className="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-black text-[11px] uppercase active:scale-95 shadow-lg">저장</button></div>
            </div>
          </div>
        )}

        {confirmModal.isOpen && (
          <div className="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[110] flex items-center justify-center p-4">
            <div className="bg-white p-8 rounded-xl shadow-2xl max-w-xs w-full text-center animate-in zoom-in-95 duration-200 font-bold">
              <div className={`w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 ${confirmModal.type === 'RESERVE' ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-500'}`}>{confirmModal.type === 'RESERVE' ? <HelpCircle size={24}/> : <AlertCircle size={24}/>}</div>
              <h4 className="font-black text-gray-900 text-sm mb-2 font-bold uppercase">포켓몬 센터 예약</h4>
              <p className="text-gray-500 text-[11px] font-bold mb-6">6월 {confirmModal.day}일 {confirmModal.type === 'RESERVE' ? "예약하시겠습니까?" : "예약을 취소하시겠습니까?"}</p>
              <div className="flex gap-2 font-bold"><button onClick={() => setConfirmModal({isOpen:false, day:null, type:null})} className="flex-1 py-2 bg-gray-100 text-gray-400 rounded-lg text-[10px] font-black uppercase">취소</button><button onClick={async () => {
                const dateStr = `2024-06-${confirmModal.day.toString().padStart(2, '0')}`;
                let nextApps;
                if (confirmModal.type === 'RESERVE') nextApps = [{ id: Date.now(), category: '센터', title: '포켓몬 정기 검진', date: dateStr, status: '처리중' }, ...userApplications];
                else nextApps = userApplications.filter(a => !(a.category === '센터' && a.date === dateStr));
                setUserApplications(nextApps); await saveUserData({ userApplications: nextApps }); setConfirmModal({ isOpen: false, day: null, type: null });
              }} className={`flex-1 py-2 text-white rounded-lg text-[10px] font-black uppercase ${confirmModal.type === 'RESERVE' ? 'bg-emerald-600' : 'bg-red-500'}`}>확인</button></div>
            </div>
          </div>
        )}
      </>
    );

    const Toast = ({ toast, setToast }) => (
      <div className="fixed bottom-6 right-6 bg-gray-900/90 backdrop-blur-md text-white px-6 py-4 rounded-xl shadow-2xl z-[200] flex items-center gap-4 animate-in slide-in-from-right-10 duration-500 border border-white/10 font-bold">
        <div className="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center flex-shrink-0 shadow-lg"><CheckCircle2 size={18}/></div>
        <div className="flex flex-col text-left"><span className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">System Update</span><span className="text-[12px] mt-0.5">{toast.message}</span></div>
        <button onClick={() => setToast({show: false, message: ''})} className="ml-4 text-gray-400 hover:text-white"><X size={16}/></button>
      </div>
    );

    // -- 뷰 컴포넌트들 --

      <div className="animate-in fade-in duration-500 space-y-5 pb-10 font-sans">
        {/* 환영 메시지 추가 */}
        <div className="flex items-center justify-between bg-white border border-emerald-100 p-6 shadow-sm">
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600">
              <Zap size={24} />
            </div>
            <div>
              <h2 className="text-lg font-black text-gray-900">환영합니다, {userProfile.position} {userProfile.name}님</h2>
              <p className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">Welcome to Indigo Plateau Management System</p>
            </div>
          </div>
          <div className="hidden md:block">
            <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100 uppercase tracking-tighter">System Online • 석영 시간 22:59</span>
          </div>
        </div>

        <div className="grid grid-cols-12 gap-5 text-left font-bold">
          <section className="col-span-12 md:col-span-8 bg-white border border-gray-100 shadow-sm p-6">
            <h3 className="font-black text-[13px] text-gray-800 uppercase tracking-tighter mb-5">자주 찾는 서비스</h3>
            <div className="grid grid-cols-3 md:grid-cols-5 gap-3">
              {SERVICE_SUB_MENUS.map((sub, idx) => (
                <div key={idx} onClick={() => handleServiceClick(sub.id)} className="flex flex-col items-center justify-center p-3 bg-gray-50/20 rounded-none border border-transparent hover:border-emerald-100 hover:bg-emerald-50/20 transition-all cursor-pointer group shadow-sm min-h-[100px]">
                  <div className="p-2.5 bg-white rounded-none shadow-sm mb-2 group-hover:scale-110 transition-transform border border-gray-50">{sub.icon}</div>
                  <span className="text-[10px] font-black text-gray-800 tracking-tighter text-center whitespace-pre-line leading-tight">{sub.label}</span>
                </div>
              ))}
            </div>
          </section>
          <section className="col-span-12 md:col-span-4 bg-white border border-emerald-100 shadow-sm p-6 flex flex-col h-full text-left">
            <div className="flex gap-4 items-center">
              <div className="w-14 h-14 bg-emerald-500 rounded-none flex items-center justify-center text-white text-2xl font-bold shadow-md overflow-hidden flex-shrink-0 border-2 border-white">
                {userProfile.profileImage ? <img src={userProfile.profileImage} className="w-full h-full object-cover" /> : userProfile.name.charAt(0)}
              </div>
              <div className="flex-1 flex flex-col justify-center truncate">
                <h4 className="font-black text-gray-800 text-[13px] truncate">{userProfile.name} <span className="font-bold text-gray-400 text-[10px]">{userProfile.position}</span></h4>
                <div className="mt-0.5 text-[10px] font-black uppercase tracking-widest text-emerald-600 truncate">{userProfile.dept}</div>
              </div>
              <div className="flex flex-col gap-1.5 flex-shrink-0">
                <button onClick={() => setCurrentPage('profile')} className="px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-none text-[9px] font-black uppercase hover:bg-emerald-100 w-full text-center transition-colors">Profile</button>
                <button onClick={logout} className="px-3 py-1.5 bg-gray-50 text-gray-400 rounded-none text-[9px] font-black uppercase hover:bg-gray-100 w-full text-center transition-colors">Logout</button>
              </div>
            </div>
            
            <div className="mt-5 pt-5 border-t border-gray-100 flex-1 flex flex-col">
              <div className="flex justify-between items-center mb-3">
                <h3 className="font-black text-[11px] text-gray-800 uppercase tracking-tighter">최근 메신저</h3>
                <button onClick={() => setCurrentPage('messenger')} className="text-[9px] font-bold text-emerald-600 hover:text-emerald-700">전체보기</button>
              </div>
              <div className="space-y-2 flex-1">
                {myChats && myChats.length > 0 ? myChats.slice(0,2).map(chat => {
                   const partnerId = chat.participants.find(id => id !== user.uid);
                   const partner = publicUsers.find(u => u.uid === partnerId);
                   return (
                      <div key={chat.id} onClick={() => { setActiveChatId(chat.id); setCurrentPage('messenger'); }} className="p-3 bg-gray-50 hover:bg-emerald-50/30 cursor-pointer border border-gray-100 flex items-center gap-3 transition-colors rounded-lg">
                         <div className="w-8 h-8 bg-gray-200 rounded-full flex-shrink-0 overflow-hidden shadow-inner border border-white">
                            {partner?.profileImage ? <img src={partner.profileImage} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center text-gray-500 font-bold text-[10px]">{partner?.name?.charAt(0) || '?'}</div>}
                         </div>
                         <div className="flex-1 overflow-hidden">
                            <div className="flex justify-between items-end mb-0.5">
                               <span className="text-[11px] font-black text-gray-800 truncate pr-2">{partner?.name || '알 수 없음'} {partner?.position}</span>
                               <span className="text-[8px] text-gray-400 font-bold flex-shrink-0">{new Date(chat.lastMessageTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <p className="text-[10px] text-gray-500 truncate font-medium">{chat.lastMessage || '새로운 대화방입니다.'}</p>
                         </div>
                      </div>
                   )
                }) : <div className="flex items-center justify-center h-full text-[10px] text-gray-400 font-bold bg-gray-50/50 rounded-lg">최근 대화 내역이 없습니다.</div>}
              </div>
            </div>
          </section>
        </div>
        <BattleBoard setCurrentPage={setCurrentPage} />
        <div className="grid grid-cols-12 gap-5 items-stretch text-left font-sans font-bold">
          <div className="col-span-12 md:col-span-8 flex flex-col gap-5">
            <BannerSlider />
            <section className="bg-white border border-gray-100 shadow-sm p-6 flex-1">
              <div className="flex justify-between items-center mb-5">
                <h3 className="font-black text-[13px] text-gray-800 uppercase tracking-tighter">최근 실시간 업무</h3>
                <button onClick={() => setCurrentPage('tasks')} className="text-[10px] font-bold text-gray-400">전체보기</button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {tasks.slice(0, 4).map(t => (
                  <div key={t.id} className="p-4 bg-gray-50/50 border border-gray-100 shadow-sm">
                    <span className={`text-[8px] font-black px-1.5 py-0.5 rounded border ${t.status === '완료' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-indigo-100 text-indigo-700 border-indigo-200'} uppercase`}>{t.status}</span>
                    <p className="text-[11px] font-black text-gray-800 mt-2 truncate leading-tight">{t.department ? `[${t.department}] ` : ''}{t.title}</p>
                  </div>
                ))}
              </div>
            </section>
          </div>
          <section className="col-span-12 md:col-span-4 bg-white border border-gray-100 shadow-sm p-6 flex flex-col">
